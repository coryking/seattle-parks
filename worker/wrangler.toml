# Seattle Parks activity finder — remote MCP server (Streamable HTTP) at /mcp.
# Deployed to *.workers.dev (no custom domain, not wired into the OpenTofu infra).
# See ./README.md and coryking/home-it-services#77 for the credential dependency.

name = "seattle-activities"
main = "src/index.js"
compatibility_date = "2026-06-23"

# The MCP SDK uses Node built-ins; required for the bundle to run on Workers.
compatibility_flags = ["nodejs_compat"]

# account_id is supplied via the CLOUDFLARE_ACCOUNT_ID env var (CI sets it from
# the repo variable `vars.CLOUDFLARE_ACCOUNT_ID`; not secret — also in
# infrastructure/variables.tf). Export it locally to deploy by hand.

# Publish the *.workers.dev route.
workers_dev = true
